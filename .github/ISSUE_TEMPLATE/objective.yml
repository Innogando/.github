name: Objective
description: Quarterly objective for the team. Keep it outcome-driven, not task-driven.
title: "[OBJECTIVE] "
labels: [objective]
type: Objective
body:
  - type: markdown
    attributes:
      value: |
        Use this template for **quarterly objectives**. One objective = one outcome you commit to by end of quarter.

        Before submitting:
        - Assign the quarterly **Milestone** (e.g. `2026 Q2 (Apr-Jun)`). Create it in this repo if it doesn't exist.
        - Area, Priority and Status are set automatically on the board; no need to repeat them here.
        - Break the objective into child issues/PRs during refinement. This issue stays as the north star.

  - type: textarea
    id: why
    attributes:
      label: Why now
      description: Problem, opportunity or strategic bet behind this objective. 2-4 lines.
      placeholder: "What happens if we don't do this? What do we unlock if we do?"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: Outcome in one sentence. Starts with a verb. No implementation detail.
      placeholder: "Reduce mean time to detect collar failures from 7d to <1d."
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: Concrete, verifiable checks. Binary or numeric.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
