name: Support
description: Support request, bug, outage, or operational question (centralized prioritization via the project).
title: "[SUPPORT] "
labels:
  - support
type: Support
body:
  - type: markdown
    attributes:
      value: |
        For **incoming work** (support, sales, interruptions). Do not assign work directly to a developer without going through the board. Create the issue, add it to the [engineering project](https://github.com/orgs/Innogando/projects/9), and set **Priority**, **Area**, and **Assignee**. Dropdowns use the same labels as the Project (see `PROJECT_SYNC.md`).

  - type: dropdown
    id: issue_kind
    attributes:
      label: Request type
      options:
        - Bug
        - Incident / outage
        - Question
        - Request / task
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area (Project · Area)
      description: Main product or layer affected.
      options:
        - CoWtrol
        - Rumi
        - Data
        - Infra
        - Cross / Platform
        - Hardware
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority (Project · Priority)
      description: P0 production or critical customer impact; P1 important; P2 everything else.
      options:
        - P0
        - P1
        - P2
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Production
        - Staging
        - Development
        - N/A / unknown
    validations:
      required: true

  - type: input
    id: repo_or_product
    attributes:
      label: Repository or product affected
      description: Repo name, app (e.g. RUMI), or service.
      placeholder: "e.g. rumi-api, mobile app, collar X"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or build (if applicable)
      placeholder: "tag, commit, app version..."
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: If not applicable (e.g. outage), write N/A and describe context.
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, screenshots, farm/device/farmer IDs, approximate time, requests (minimize unnecessary personal data).
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: User or business impact
      description: Who is affected and how.
    validations:
      required: false
