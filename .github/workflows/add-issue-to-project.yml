name: Add issue to Granja de Rus project

on:
  workflow_call:
    secrets:
      GH_PROJECTS_PAT:
        required: true

jobs:
  add-and-set-area:
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to project
        id: add
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/orgs/Innogando/projects/9
          github-token: ${{ secrets.GH_PROJECTS_PAT }}

      - name: Resolve Area option id from repo name
        id: area
        env:
          REPO: ${{ github.event.repository.name }}
        run: |
          case "$REPO" in
            airflow)                 OPT="033f7249" ;;   # Data
            cowtrol|cowtrol-api)     OPT="8f3c6346" ;;   # CoWtrol
            rumi-api|rumi-app)       OPT="bbc23f7e" ;;   # Rumi
            k8s-infra)               OPT="3ca30339" ;;   # Infra
            *)                       OPT="86907580" ;;   # Cross / Platform (incl. management)
          esac
          echo "option_id=$OPT" >> "$GITHUB_OUTPUT"

      - name: Set Area field
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECTS_PAT }}
          PROJECT_ID: PVT_kwDOCA2kqc4BUnfM
          FIELD_ID: PVTSSF_lADOCA2kqc4BUnfMzhQ1c-M
          ITEM_ID: ${{ steps.add.outputs.itemId }}
          OPTION_ID: ${{ steps.area.outputs.option_id }}
        run: |
          gh api graphql -f query='
            mutation($project:ID!,$item:ID!,$field:ID!,$opt:String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId:    $item
                fieldId:   $field
                value:     { singleSelectOptionId: $opt }
              }) { projectV2Item { id } }
            }
          ' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$FIELD_ID" -f opt="$OPTION_ID"

      - name: Set Priority field (default P1)
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECTS_PAT }}
          PROJECT_ID: PVT_kwDOCA2kqc4BUnfM
          FIELD_ID: PVTSSF_lADOCA2kqc4BUnfMzhBuedQ
          ITEM_ID: ${{ steps.add.outputs.itemId }}
          OPTION_ID: 7cf0f370
        run: |
          gh api graphql -f query='
            mutation($project:ID!,$item:ID!,$field:ID!,$opt:String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: $project
                itemId:    $item
                fieldId:   $field
                value:     { singleSelectOptionId: $opt }
              }) { projectV2Item { id } }
            }
          ' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$FIELD_ID" -f opt="$OPTION_ID"

      - name: Ensure Issue Type (default Task, support/censo labels override; skip if already set)
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECTS_PAT }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          LABELS_JSON: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          set -euo pipefail

          current=$(gh api graphql -f query='
            query($issue:ID!) {
              node(id:$issue) { ... on Issue { issueType { name } } }
            }
          ' -f issue="$ISSUE_NODE_ID" | jq -r '.data.node.issueType.name // empty')

          if [ -n "$current" ]; then
            echo "Issue already has type '$current' (set by template or user). Skipping."
            exit 0
          fi

          labels=$(echo "$LABELS_JSON" | jq -r '.[]')
          if echo "$labels" | grep -qx "censo"; then
            TYPE_ID="IT_kwDOCA2kqc4B-ccB"  # Censo
          elif echo "$labels" | grep -qx "support"; then
            TYPE_ID="IT_kwDOCA2kqc4B-AWn"  # Support
          else
            TYPE_ID="IT_kwDOCA2kqc4BK9Nl"  # Task (default)
          fi

          gh api graphql -f query='
            mutation($issue:ID!,$type:ID!) {
              updateIssueIssueType(input:{ issueId:$issue, issueTypeId:$type }) {
                issue { id issueType { name } }
              }
            }
          ' -f issue="$ISSUE_NODE_ID" -f type="$TYPE_ID"
